<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Lugar — ESTRELLAS</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fff;
  color: #111;
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  align-items: flex-end;
  padding: 0 8% 80px;
  background: url('estrellas.jpg') center/cover no-repeat;
  color: white;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  font-weight: 400;
}

/* BLOQUES */
.section {
  padding: 80px 8%;
  max-width: 700px;
}

.big {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  line-height: 1.4;
}

/* IMAGEN FULL */
.full img {
  width: 100%;
  display: block;
}

/* VIDEO */
.video {
  position: relative;
  padding-top: 56.25%;
}

.video iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero {
    height: 60vh;
    padding-bottom: 40px;
  }

  .hero h1 {
    font-size: 1.8rem;
  }

  .big {
    font-size: 1.6rem;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Donde el mundo se queda fuera.</h1>
</section>

<!-- FRASE -->
<section class="section">
  <div class="big">
    Agua.<br>
    Silencio.<br>
    Cielo.
  </div>
</section>

<!-- IMAGEN -->
<section class="full">
  <img src="estrellas.jpg">
</section>

<!-- FRASE -->
<section class="section">
  <div class="big">
    Aquí no pasa nada.<br>
    Y eso es exactamente lo que buscas.
  </div>
</section>

<!-- VIDEO -->
<section>
  <div class="video">
    <iframe 
      src="https://www.youtube.com/embed/ouDq46PC_i8?autoplay=1&mute=1&loop=1&playlist=ouDq46PC_i8&controls=0"
      allow="autoplay"
      allowfullscreen>
    </iframe>
  </div>
</section>

<!-- CIERRE -->
<section class="section">
  <div class="big">
    No vienes a hacer cosas.<br>
    Vienes a dejar de hacerlas.
  </div>
</section>

</body>
</html>
