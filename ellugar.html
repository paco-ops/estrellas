<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Lugar — ESTRELLAS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fff;
  color: #111;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.nav {
  position: absolute;
  top: 20px;
  left: 8%;
  right: 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 5;
  color: white;
  font-size: 13px;
  letter-spacing: 1px;
}

.nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  opacity: 0.85;
}

.nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  position: relative;
  height: 80vh;
  display: flex;
  align-items: center;
  padding: 0 8%;
  color: white;
  background: url('club7.jpg') center/cover no-repeat;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
}

.hero h1 {
  position: relative;
  z-index: 2;
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  font-weight: 400;
}

/* SECCIONES */
.section {
  padding: 80px 8%;
  max-width: 700px;
}

/* TEXTO */
.big {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  line-height: 1.4;
}

/* IMÁGENES */
.full {
  height: 70vh;
  overflow: hidden;
}

.full img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* VIDEO */
.video {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  margin: 40px 0;
}

.video iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* 🔥 HERO FINAL (ARREGLADO) */
.final-hero {
  position: relative;
  color: white;
  height: 70vh;
  display: flex;
  align-items: center;
  padding: 0 8%;
  width: 100%;
  max-width: none;
  background: url('club77.jpg') center/cover no-repeat;
}

.final-hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.6)
  );
}

.final-hero .big {
  position: relative;
  z-index: 2;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero { height: 60vh; }
  .hero h1 { font-size: 1.8rem; }
  .big { font-size: 1.6rem; }
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div><a href="index.html">ESTRELLAS</a></div>
  <div>
    <a href="ellugar.html">EL LUGAR</a>
    <a href="elclub.html">EL CLUB</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Donde el mundo se queda fuera.</h1>
</section>

<!-- FRASE -->
<section class="section">
  <div class="big">
    Agua.<br>
    Silencio.<br>
    Y... Cielo.
  </div>
</section>

<!-- IMAGEN -->
<section class="full">
  <img src="club5.jpg">
</section>

<!-- FRASE -->
<section class="section">
  <div class="big">
    Aquí no pasa nada.<br>
    Y eso es exactamente lo que buscas.<br><br>
    No vienes a hacer cosas.<br>
Vienes a dejar de hacerlas.


  </div>
</section>

<!-- VIDEO -->
<section>
  <div class="video">
    <iframe 
      src="https://player.vimeo.com/video/1190237957?autoplay=1&muted=1&loop=1&background=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>
</section>

<!-- 🔥 CIERRE CORRECTO -->
<section class="final-hero">
  <div class="big">
    En Alqueva,<br>
    donde la oscuridad aún se conserva.
  </div>
</section>
<section class="section">
  <div class="big-text">
    Si sigues,<br>
    lo entenderás.
  </div>

  <a href="elclub.html" class="button">
    CONTINUAR
  </a>
</section>
</body>
</html>
