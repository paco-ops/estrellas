<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTRELLAS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fff;
  color: #111;
  -webkit-font-smoothing: antialiased;
}

/* ACCESS */

.access {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.access-box {
  text-align: center;
}

.access-box h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
}

.access-box input {
  margin-top: 20px;
  padding: 10px;
  border: none;
  border-bottom: 1px solid white;
  background: transparent;
  color: white;
  text-align: center;
  outline: none;
}

.access-box button {
  margin-top: 20px;
  padding: 10px 20px;
  background: white;
  border: none;
  cursor: pointer;
}

/* NAV */

.nav {
  position: absolute;
  top: 20px;
  left: 8%;
  right: 8%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 5;
  color: white;
  font-size: 13px;
  letter-spacing: 1px;
}

.nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  opacity: 0.85;
  transition: opacity 0.3s ease;
}

.nav a:hover {
  opacity: 1;
}

/* HERO */

.hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  padding: 0 8% 5%;
  color: white;
  overflow: hidden;
}

.hero img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CINEMATIC OVERLAY */

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  background:
    linear-gradient(
      to right,
      rgba(0,0,0,0.48) 0%,
      rgba(0,0,0,0.28) 22%,
      rgba(0,0,0,0.10) 42%,
      rgba(0,0,0,0.02) 65%,
      rgba(0,0,0,0) 100%
    ),
    linear-gradient(
      to bottom,
      rgba(0,0,0,0.18) 0%,
      rgba(0,0,0,0.02) 30%,
      rgba(0,0,0,0.22) 100%
    );
}

.content {
  position: relative;
  max-width: 600px;
  z-index: 2;
}

/* TYPOGRAPHY */

h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  font-size: 3rem;
  line-height: 1.15;
  letter-spacing: -0.02em;
}

.section {
  padding: 80px 8%;
  max-width: 700px;
}

.big-text {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  line-height: 1.4;
}

.button {
  display: inline-block;
  padding: 12px 28px;
  background: rgba(255,255,255,0.92);
  color: black;
  text-decoration: none;
  transition: all 0.3s ease;
}

.button:hover {
  background: white;
}

/* VIDEO */

.video-block {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
}

.video-block iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* MOBILE */

@media (max-width: 768px) {

  h1 {
    font-size: 2.2rem;
  }

  .big-text {
    font-size: 1.5rem;
  }

  .nav {
    font-size: 11px;
  }

}

</style>
</head>

<body>

<!-- ACCESS -->

<div class="access" id="access">
  <div class="access-box">
    <h1>ESTRELLAS</h1>

    <input
      type="password"
      id="pass"
      placeholder="Access"
      onkeypress="if(event.key==='Enter'){check();}"
    >

    <br>

    <button onclick="check()">Enter</button>
  </div>
</div>

<!-- SITE -->

<div id="site" style="display:none">

<nav class="nav">
  <div>
    <a href="/en/index.html">ESTRELLAS</a>
  </div>

  <div>
    <a href="/en/place.html">THE PLACE</a>
    <a href="/en/club.html">THE CLUB</a>
    <a href="/index.html">ES</a>
  </div>
</nav>

<section class="hero">

  <img src="/club11.jpg" alt="ESTRELLAS">

  <div class="content">
    <h1>
      There are places you go.<br><br>
      And places you return to.
    </h1>
  </div>

</section>

<section class="section">
  <div class="big-text">
    Not a hotel.<br>
    Not a retreat.<br>
    Not a rural house.
    <br><br><br>
    A place where the world fades away.<br>
    Where time slows down.<br>
    Where silence becomes meaningful again.
  </div>
</section>

<section>
  <div class="video-block">
    <iframe src="https://player.vimeo.com/video/1190233687?autoplay=1&muted=1&loop=1&background=1"></iframe>
  </div>
</section>

<section class="section">
  <div class="big-text">
    It’s a destination.<br>
    It’s a home.
  </div>
</section>

<section class="section">
  <a href="/en/place.html" class="button">
    CONTINUE
  </a>
</section>

</div>

<script>

function check() {

  if (document.getElementById("pass").value === "estrellas") {

    document.getElementById("access").style.display = "none";
    document.getElementById("site").style.display = "block";

  }

}

</script>

</body>
</html>
