<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTRELLAS</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fff;
  color: #111;
}

.hero::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0%,
    white 100%
  );
  z-index: 1;
}

.hero img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  left: 0;
  z-index: 0;
}

.overlay {
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.6) 0%,
    rgba(0,0,0,0.3) 40%,
    rgba(0,0,0,0) 80%
  );
}

.content {
  position: relative;
  z-index: 2;
  max-width: 600px;
}

/* TITULAR */
h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  font-size: 3rem;
  line-height: 1.2;
  margin-bottom: 20px;
}

/* SUBTEXTO */
.sub {
  font-size: 1.1rem;
  opacity: 0.8;
  margin-bottom: 30px;
}

/* BOTÓN */
.button {
  display: inline-block;
  padding: 12px 28px;
  background: rgba(255,255,255,0.9);
  color: black;
  text-decoration: none;
  font-size: 0.9rem;
  letter-spacing: 1px;
  transition: all 0.3s ease;
}

.button:hover {
  background: white;
}

/* BLOQUES */
.section {
  padding: 80px 8%;
  max-width: 900px;
}

.big-text {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  line-height: 1.4;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  h1 {
    font-size: 2rem;
  }

  .big-text {
    font-size: 1.6rem;
  }

  .hero {
    padding: 0 8% 10%;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <!-- IMAGEN -->
  <img src="estrellas.jpg">

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- CONTENIDO -->
  <div class="content">

    <h1>
      Hay lugares a los que vas.<br><br>
      Y lugares a los que vuelves.
    </h1>

    <div class="sub">
      Donde el mundo se queda fuera.
    </div>

    <a href="#" class="button">
      SOLICITAR INVITACIÓN
    </a>

  </div>

</section>

<!-- BLOQUE 2 -->
<section class="section">
  <div class="big-text">
    No es un hotel.<br>
    No es un retiro.<br>
    No es una casa rural.
  </div>
</section>

<!-- BLOQUE 3 -->
<section class="section">
  <div class="big-text">
    Es un lugar donde el mundo se queda fuera.<br>
    Donde el tiempo se estira.<br>
    Donde el silencio vuelve a tener sentido.
  </div>
</section>

</body>
</html>
