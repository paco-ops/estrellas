<style>
body {

}

/* NAV */
.nav {
  position: absolute;
  top: 20px;
  left: 8%;

  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 5;
  color: white;
  font-size: 13px;

}

.nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  opacity: 0.85;
}

.nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {

  height: 80vh;

  padding: 0 8%;       /* 🔥 CAMBIO */

  background: url('club6.jpg') center/cover no-repeat;

}

  font-size: 2.5rem;

}

/* SECCIONES */
.section {

  line-height: 1.4;
}

/* IMAGEN FULL */
.full img {

  display: block;
}

/* BOTÓN */

  display: inline-block;
  margin-top: 40px;
  padding: 12px 28px;
  background: #111;
  color: white;
  text-decoration: none;
  font-size: 0.9rem;
  letter-spacing: 1px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero { height: 60vh; }
  .hero h1 { font-size: 1.8rem; }
  .big { font-size: 1.6rem; }
}
